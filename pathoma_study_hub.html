<style>
  :root{
    --paper:#EDEFEA;
    --paper-deep:#E2E5DD;
    --ink:#182225;
    --ink-soft:#4B5A5A;
    --hema:#5B4B93;
    --eosin:#B23A2E;
    --eosin-soft:#D97B6C;
    --line:#C9CFC4;
    --card-bg:#F8F8F4;
    --good:#3F7A5C;
  }
  *{box-sizing:border-box;}
  #ph-root{
    font-family:'IBM Plex Sans',Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    padding:0;
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--line);
    min-height:640px;
  }
  #ph-root .serif{font-family:'Source Serif 4','Georgia',serif;}
  #ph-root .mono{font-family:'IBM Plex Mono',monospace;}

  .ph-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 26px;background:var(--ink);color:var(--paper);
  }
  .ph-header .title{font-family:'Source Serif 4',Georgia,serif;font-size:20px;letter-spacing:.2px;}
  .ph-header .subtitle{font-size:11px;opacity:.65;margin-top:2px;letter-spacing:.6px;text-transform:uppercase;}
  .stain-swatch{width:34px;height:10px;border-radius:2px;background:linear-gradient(90deg,var(--hema),var(--eosin));display:inline-block;margin-right:10px;vertical-align:middle;}
  .ph-progress{display:flex;align-items:center;gap:10px;font-size:12px;}
  .ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:conic-gradient(var(--eosin) calc(var(--pct)*1%), rgba(255,255,255,.15) 0);}
  .ring-inner{width:34px;height:34px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;}

  .ph-body{display:flex;min-height:560px;}
  .ph-rail{
    width:230px;flex-shrink:0;background:var(--paper-deep);border-right:1px solid var(--line);
    padding:14px 10px;overflow-y:auto;max-height:640px;
  }
  .rail-item{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;
    margin-bottom:3px;border:1px solid transparent;
  }
  .rail-item:hover{background:#DEE2D6;}
  .rail-item.active{background:var(--card-bg);border-color:var(--line);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .rail-day{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft);width:34px;}
  .rail-label{font-size:12.5px;line-height:1.25;flex:1;}
  .rail-check{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;}
  .rail-check.done{background:var(--good);border-color:var(--good);}
  .rail-swatch{width:4px;align-self:stretch;border-radius:2px;background:linear-gradient(180deg,var(--hema),var(--eosin));}

  .ph-main{flex:1;padding:24px 30px;overflow-y:auto;max-height:640px;}
  .day-eyebrow{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px;}
  .day-title{font-family:'Source Serif 4',Georgia,serif;font-size:26px;margin:0 0 14px 0;}
  .chapter-chip{
    display:inline-block;background:var(--card-bg);border:1px solid var(--line);border-radius:20px;
    padding:5px 13px;font-size:12px;margin:0 8px 8px 0;
  }
  .section-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--hema);font-weight:600;margin:22px 0 10px;}
  .obj-list{margin:0;padding-left:18px;font-size:14px;line-height:1.65;}
  .obj-list li{margin-bottom:4px;}

  .pathway{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin:8px 0 4px;}
  .pw-step{background:var(--card-bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12.5px;max-width:160px;}
  .pw-arrow{color:var(--eosin-soft);font-size:16px;}

  .btn{
    font-family:'IBM Plex Sans',sans-serif;border:none;border-radius:8px;padding:10px 18px;font-size:13px;
    cursor:pointer;font-weight:600;letter-spacing:.2px;
  }
  .btn-primary{background:var(--eosin);color:#fff;}
  .btn-primary:hover{background:#963026;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-ghost:hover{background:var(--card-bg);}
  .btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}

  .day-stats{font-size:12px;color:var(--ink-soft);margin-top:6px;}

  /* flashcard view */
  .fc-wrap{display:flex;flex-direction:column;align-items:center;padding-top:6px;}
  .fc-progress{width:100%;max-width:460px;height:4px;background:var(--line);border-radius:3px;margin-bottom:22px;overflow:hidden;}
  .fc-progress-fill{height:100%;background:var(--eosin);transition:width .25s;}
  .fc-card{
    width:100%;max-width:460px;min-height:220px;background:var(--card-bg);border:1px solid var(--line);
    border-radius:14px;padding:28px;display:flex;align-items:center;justify-content:center;text-align:center;
    cursor:pointer;font-size:16px;line-height:1.5;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.06);
  }
  .fc-tag{position:absolute;top:12px;left:16px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);}
  .fc-hint{font-size:11px;color:var(--ink-soft);margin-top:12px;}
  .fc-actions{display:flex;gap:10px;margin-top:20px;}
  .fc-count{font-size:12px;color:var(--ink-soft);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}
  .fc-done{text-align:center;padding:40px 0;}
  .fc-done .serif{font-size:22px;margin-bottom:8px;}

  @media (max-width:720px){
    .ph-body{flex-direction:column;}
    .ph-rail{width:100%;max-height:180px;}
    .ph-main{max-height:none;}
  }
</style>

 objectives:[
  "Re-drill every card marked 'review again' across all 19 chapters",
  "Redraw the nephritic-vs-nephrotic and cell injury diagrams from memory, unaided",
  "Build your own comparison chart: MEN syndromes, pediatric CNS tumors, and bone tumors side by side",
  "Do a full 40-question timed practice block mixing all organ systems",
  "Flag your 3 weakest chapters for one more targeted pass"]},
{n:14, title:"Final Review & Practice Exam", review:true, range:[1,12],
 objectives:[
  "Run one complete flashcard sweep — every day, every card, no skipping",
  "Simulate a timed practice block under real exam conditions (no notes, strict time)",
  "Review only what you missed — don't re-study material you already know cold",
  "Get sleep the night before your exam — recognition memory drops sharply with fatigue",
  "Trust the repetition you've put in over these 14 days"]}
];

// ---------- state ----------
let state = {daysDone:{}, cards:{}}; // cards[id] = 'known' | undefined
let currentDay = 1;
let fcQueue = [];
let fcIndex = 0;
let fcFlipped = false;

function allCardIds(dayObj){
  if (dayObj.review){
    const ids = [];
    DAYS.filter(d=>!d.review && d.n>=dayObj.range[0] && d.n<=dayObj.range[1]).forEach(d=>{
      (d.cards||[]).forEach((c,i)=>ids.push('d'+d.n+'-'+i));
    });
    return ids;
  }
  return (dayObj.cards||[]).map((c,i)=>'d'+dayObj.n+'-'+i);
}
function cardById(id){
  const [dPart, idx] = id.split('-');
  const dn = parseInt(dPart.slice(1));
  const d = DAYS.find(x=>x.n===dn);
  return d.cards[parseInt(idx)];
}
function totalCardCount(){
  let t=0; DAYS.forEach(d=>{ if(!d.review) t += (d.cards||[]).length; });
  return t;
}
function knownCardCount(){
  return Object.values(state.cards).filter(v=>v==='known').length;
}

async function loadState(){
  try{
    const r = await window.storage.get('ph-progress', false);
    if (r && r.value) state = JSON.parse(r.value);
  }catch(e){ /* no saved state yet */ }
}
async function saveState(){
  try{ await window.storage.set('ph-progress', JSON.stringify(state), false); }
  catch(e){ console.error('save failed', e); }
}

// ---------- render ----------
function renderAll(){
  renderHeader();
  renderRail();
  renderMain();
}

function renderHeader(){
  const daysDoneCount = Object.values(state.daysDone).filter(Boolean).length;
  const total = totalCardCount();
  const known = knownCardCount();
  const pct = total ? Math.round((known/total)*100) : 0;
  document.getElementById('ph-days-done').textContent = daysDoneCount + ' / 14 days';
  document.getElementById('ph-cards-done').textContent = known + ' / ' + total + ' cards mastered';
  document.getElementById('ph-ring').style.setProperty('--pct', pct);
  document.getElementById('ph-ring-text').textContent = pct + '%';
}

function renderRail(){
  const rail = document.getElementById('ph-rail');
  rail.innerHTML = '';
  DAYS.forEach(d=>{
    const item = document.createElement('div');
    item.className = 'rail-item' + (d.n===currentDay ? ' active':'');
    const done = !!state.daysDone[d.n];
    item.innerHTML = `
      <div class="rail-swatch"></div>
      <div class="rail-day mono">D${d.n}</div>
      <div class="rail-label">${d.title}</div>
      <div class="rail-check ${done?'done':''}"></div>
    `;
    item.onclick = ()=>{ currentDay = d.n; fcQueue=[]; renderAll(); };
    rail.appendChild(item);
  });
}

function renderMain(){
  const main = document.getElementById('ph-main');
  const d = DAYS.find(x=>x.n===currentDay);
  const done = !!state.daysDone[d.n];

  let chapterChips = '';
  if (!d.review){
    chapterChips = d.chapters.map(c=>`<span class="chapter-chip">Ch. ${c.num} — ${c.name}</span>`).join('');
  } else {
    chapterChips = `<span class="chapter-chip">Review: Days ${d.range[0]}–${d.range[1]}</span>`;
  }

  let pathwayHtml = '';
  if (d.pathway){
    pathwayHtml = `<div class="section-label">${d.pathway.title}</div><div class="pathway">` +
      d.pathway.steps.map((s,i)=> `<div class="pw-step">${s}</div>` + (i<d.pathway.steps.length-1?'<div class="pw-arrow">→</div>':'')).join('') +
      `</div>`;
  }

  const ids = allCardIds(d);
  const knownInDay = ids.filter(id=>state.cards[id]==='known').length;

  main.innerHTML = `
    <div class="day-eyebrow">Day ${d.n} of 14</div>
    <h2 class="day-title">${d.title}</h2>
    <div>${chapterChips}</div>
    <div class="section-label">Study objectives</div>
    <ul class="obj-list">${d.objectives.map(o=>`<li>${o}</li>`).join('')}</ul>
    ${pathwayHtml}
    <div class="day-stats mono">${knownInDay} / ${ids.length} cards mastered for this day</div>
    <div class="btn-row">
      ${ids.length ? `<button class="btn btn-primary" id="ph-start-fc">Drill flashcards (${ids.length})</button>` : ''}
      <button class="btn btn-ghost" id="ph-toggle-done">${done ? '✓ Marked complete' : 'Mark day complete'}</button>
    </div>
    <div id="ph-fc-zone" style="margin-top:26px;"></div>
  `;

  const startBtn = document.getElementById('ph-start-fc');
  if (startBtn) startBtn.onclick = ()=> startFlashcards(d);
  document.getElementById('ph-toggle-done').onclick = async ()=>{
    state.daysDone[d.n] = !state.daysDone[d.n];
    await saveState();
    renderAll();
  };
}

function startFlashcards(d){
  fcQueue = allCardIds(d).slice();
  // put not-yet-known cards first
  fcQueue.sort((a,b)=> (state.cards[a]==='known'?1:0) - (state.cards[b]==='known'?1:0));
  fcIndex = 0;
  fcFlipped = false;
  renderFlashcard();
}

function renderFlashcard(){
  const zone = document.getElementById('ph-fc-zone');
  if (!zone) return;
  if (fcIndex >= fcQueue.length){
    zone.innerHTML = `<div class="fc-done"><div class="serif">Deck complete.</div><div style="color:var(--ink-soft);font-size:13px;">Nice work — come back anytime to re-drill.</div></div>`;
    return;
  }
  const id = fcQueue[fcIndex];
  const card = cardById(id);
  const pct = Math.round((fcIndex/fcQueue.length)*100);
  zone.innerHTML = `
    <div class="fc-wrap">
      <div class="fc-count">CARD ${fcIndex+1} / ${fcQueue.length}</div>
      <div class="fc-progress"><div class="fc-progress-fill" style="width:${pct}%"></div></div>
      <div class="fc-card" id="ph-fc-card">
        <div class="fc-tag">${fcFlipped ? 'Answer' : 'Question'}</div>
        <div>${fcFlipped ? card.a : card.q}</div>
      </div>
      <div class="fc-hint">${fcFlipped ? '' : 'Tap the card to reveal the answer'}</div>
      <div class="fc-actions" id="ph-fc-actions" style="${fcFlipped ? '' : 'display:none;'}">
        <button class="btn btn-ghost" id="ph-fc-again">Review again</button>
        <button class="btn btn-primary" id="ph-fc-known">Got it</button>
      </div>
    </div>
  `;
  document.getElementById('ph-fc-card').onclick = ()=>{
    fcFlipped = !fcFlipped;
    renderFlashcard();
  };
  if (fcFlipped){
    document.getElementById('ph-fc-again').onclick = async (e)=>{
      e.stopPropagation();
      delete state.cards[id];
      await saveState();
      fcIndex++; fcFlipped=false;
      renderFlashcard(); renderHeader();
    };
    document.getElementById('ph-fc-known').onclick = async (e)=>{
      e.stopPropagation();
      state.cards[id] = 'known';
      await saveState();
      fcIndex++; fcFlipped=false;
      renderFlashcard(); renderHeader();
    };
  }
}

// ---------- init ----------
(async function init(){
  await loadState();
  renderAll();
})();

})();
</script>
